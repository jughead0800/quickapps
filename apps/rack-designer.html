<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Rack Designer</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #1a1d24;
    --surface-elev: #232730;
    --border: #2e333d;
    --text: #e6e8ec;
    --text-muted: #8b919c;
    --accent: #6366f1;
    --danger: #ef4444;
    --ok: #22c55e;
    --ru-height: 26px;
    --rack-width: 280px;
    --gutter-width: 56px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 13px/1.4 system-ui, -apple-system, sans-serif; height: 100%; }
  body { display: grid; grid-template-rows: auto 1fr; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 12px; }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.2px; }
  header .status { color: var(--text-muted); font-size: 12px; margin-left: auto; }
  .view-tabs { display: flex; gap: 4px; }
  .view-tab {
    background: transparent; color: var(--text-muted);
    border: 1px solid transparent; border-radius: 4px;
    padding: 4px 12px; font: inherit; cursor: pointer;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active { background: var(--surface-elev); color: var(--text); border-color: var(--border); }
  #view-host { min-height: 0; height: 100%; }
  main { display: grid; grid-template-columns: 240px 1fr 1fr; min-height: 0; height: 100%; }
  #main-net { height: 100%; min-height: 0; flex-direction: column; }
  .col { border-right: 1px solid var(--border); padding: 12px; overflow: auto; }
  .col:last-child { border-right: 0; }
  .col h2 { margin: 0 0 8px 0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .rack-wrap { display: flex; align-items: stretch; justify-content: center; gap: 0; }
  .gutter { width: var(--gutter-width); position: relative; }
  .rack {
    width: var(--rack-width);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px;
    display: flex; flex-direction: column-reverse; /* RU 1 at bottom */
  }
  .ru-row {
    height: var(--ru-height);
    border-top: 1px dashed var(--border);
    display: flex; align-items: center;
    color: var(--text-muted);
    font-size: 10px;
    padding: 0 6px;
    position: relative;
  }
  .ru-row:first-child { border-top: 0; }
  .ru-num { width: 22px; flex-shrink: 0; text-align: right; padding-right: 6px; opacity: 0.7; }
  .ru-row.front .ru-num { order: 0; }
  .ru-row.rear .ru-num { order: 1; text-align: left; padding-right: 0; padding-left: 6px; }
  .ru-row.rear { flex-direction: row-reverse; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="text"], input[type="number"] {
    background: var(--surface-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; font: inherit;
  }
  input[type="text"]:focus, input[type="number"]:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .btn {
    background: var(--surface-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 5px 8px; font: inherit; cursor: pointer; flex: 1;
  }
  .btn:hover { border-color: var(--accent); }
  .preset {
    background: var(--surface-elev); border: 1px solid var(--border);
    border-radius: 3px; padding: 6px 8px; margin-bottom: 4px; cursor: grab;
    user-select: none;
  }
  .preset:hover { border-color: var(--accent); }
  .preset.dragging { opacity: 0.4; }
  .ru-row { position: relative; }
  .device-tile {
    position: absolute;
    left: 28px; right: 4px; bottom: 1px;
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    padding: 0 8px;
    display: flex; align-items: center;
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
    cursor: grab;
    user-select: none;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    z-index: 2;
  }
  .ru-row.rear .device-tile { left: 4px; right: 28px; }
  .device-tile.dragging { opacity: 0.4; }
  .drag-ghost {
    position: fixed; pointer-events: none;
    left: -1000px; top: -1000px;
    width: 220px;
    color: #fff; font-size: 11px; font-weight: 500;
    padding: 4px 8px; border-radius: 2px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    display: flex; align-items: center;
    z-index: 1000;
    opacity: 0.85;
  }
  .ru-row.preview-ok { background: rgba(34, 197, 94, 0.18); }
  .ru-row.preview-bad { background: rgba(239, 68, 68, 0.22); }
  .popover {
    position: fixed; z-index: 2000;
    width: 260px; max-height: 90vh; overflow: auto;
    background: var(--surface-elev);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    padding: 10px;
  }
  .popover-title { font-weight: 600; margin-bottom: 8px; }
  .popover-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .radio-row { display: flex; gap: 10px; }
  .radio-row label { font-size: 11px; }
  .color-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
  }
  .swatch {
    width: 22px; height: 22px; border-radius: 3px; border: 1px solid transparent;
    cursor: pointer; padding: 0;
  }
  .swatch.selected { border: 2px solid var(--text); }
  .popover-buttons { display: flex; gap: 6px; margin-top: 6px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); }
  .btn.danger { background: var(--danger); border-color: var(--danger); }
  .device-tile.selected { box-shadow: 0 0 0 2px var(--text); }
  .section-bar {
    position: absolute;
    width: 10px;
    border-radius: 2px;
    opacity: 0.9;
    cursor: pointer;
  }
  .section-bar:hover { opacity: 1; box-shadow: 0 0 0 1px var(--text); }
  .section-label {
    position: absolute;
    top: 4px; left: 12px;
    font-size: 10px; color: var(--text);
    white-space: nowrap;
    background: rgba(0,0,0,0.55);
    padding: 1px 4px; border-radius: 2px;
    pointer-events: none;
  }
  .gutter { position: relative; }
  body.section-mode .gutter { background: rgba(99, 102, 241, 0.08); cursor: crosshair; }
  body.section-mode .gutter::after {
    content: 'Drag in a gutter to define section range';
    position: absolute; top: 4px; left: 4px;
    font-size: 9px; color: var(--text-muted);
    pointer-events: none;
  }
  .ru-row.section-preview { background: rgba(99, 102, 241, 0.18); }
  .check-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); cursor: pointer; }
  .check-row input[type="checkbox"] { margin: 0; cursor: pointer; }

  /* ---- Networking view ---- */
  select { background: var(--surface-elev); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; font: inherit; }
  select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  textarea { background: var(--surface-elev); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; font: inherit; resize: vertical; }
  #net-root { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .net-tabstrip { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; flex-shrink: 0; }
  .net-tab { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; background: var(--surface-elev); color: var(--text-muted); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font: inherit; cursor: pointer; }
  .net-tab:hover { color: var(--text); }
  .net-tab.active { color: var(--text); border-color: var(--accent); }
  .net-tab .net-tab-close { color: var(--text-muted); border: 0; background: transparent; cursor: pointer; padding: 0 2px; font-size: 14px; line-height: 1; }
  .net-tab .net-tab-close:hover { color: var(--danger); }
  .net-pane { flex: 1; min-height: 0; overflow: auto; padding: 16px; }
  .net-section { max-width: 920px; margin: 0 auto 20px auto; }
  .net-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin: 0 0 10px 0; }
  .net-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .net-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .net-row + .net-row { margin-top: 8px; }
  .net-grow { flex: 1; min-width: 80px; }
  .net-muted { color: var(--text-muted); font-size: 12px; }
  table.net-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.net-table th, table.net-table td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.net-table th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  table.net-table tr.broken td { background: rgba(239, 68, 68, 0.12); }
  .net-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; border: 1px solid var(--border); color: var(--text-muted); }
  .net-badge.ok { color: var(--ok); border-color: rgba(34,197,94,0.4); }
  .net-badge.broken { color: var(--danger); border-color: rgba(239,68,68,0.4); }
  .net-pill { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; color: #fff; }
  .net-iconbtn { background: var(--surface-elev); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; font: inherit; cursor: pointer; }
  .net-iconbtn:hover { border-color: var(--accent); }
  .net-empty { color: var(--text-muted); font-size: 13px; padding: 16px 0; text-align: center; }
  .net-portgroup { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .net-portgroup input[type="text"] { width: 160px; }
  .net-portgroup input[type="number"] { width: 80px; }
  .net-connect-form { display: none; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 6px; padding: 8px; border: 1px dashed var(--border); border-radius: 4px; }
  .net-connect-form.open { display: flex; }
</style>
</head>
<body>
<header>
  <h1>Rack Designer</h1>
  <div class="view-tabs" id="view-tabs">
    <button type="button" class="view-tab active" data-view="rack">Rack</button>
    <button type="button" class="view-tab" data-view="networking">Networking</button>
  </div>
  <span class="status" id="status"></span>
</header>
<div id="view-host">
  <main id="main-rack">
    <aside class="col" id="palette-col">
      <h2>Toolbar</h2>
      <div id="toolbar"></div>
      <h2 style="margin-top:16px;">Presets</h2>
      <div id="presets"></div>
    </aside>
    <section class="col" id="front-col">
      <h2>Front</h2>
      <div class="rack-wrap">
        <div class="gutter" id="front-gutter"></div>
        <div class="rack" id="front-rack"></div>
      </div>
    </section>
    <section class="col" id="back-col">
      <h2>Back</h2>
      <div class="rack-wrap">
        <div class="rack" id="rear-rack"></div>
        <div class="gutter" id="rear-gutter"></div>
      </div>
    </section>
  </main>
  <section id="main-net" style="display:none;">
    <div id="net-root"></div>
  </section>
</div>
<script>
'use strict';

// =================================================================
// Test harness — runs only when ?test=1 is in the URL.
// Tests defined throughout the file via Tests.test(name, fn).
// =================================================================
const Tests = (() => {
  const tests = [];
  function test(name, fn) { tests.push({ name, fn }); }
  function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }
  function assertEq(a, b, msg) {
    const sa = JSON.stringify(a), sb = JSON.stringify(b);
    if (sa !== sb) throw new Error(`${msg || 'not equal'}: ${sa} !== ${sb}`);
  }
  function run() {
    const results = tests.map(t => {
      try { t.fn(); return { name: t.name, passed: true }; }
      catch (e) { return { name: t.name, passed: false, error: e }; }
    });
    const passed = results.filter(r => r.passed).length;
    const status = document.getElementById('status');
    if (status) {
      const failed = results.length - passed;
      status.textContent = `tests: ${passed}/${results.length} passed` + (failed ? ` — ${failed} FAILED (see console)` : '');
      status.style.color = failed ? 'var(--danger)' : 'var(--ok)';
    }
    results.filter(r => !r.passed).forEach(r => console.error('FAIL:', r.name, r.error));
    console.log(`Tests: ${passed}/${results.length} passed`);
    return results;
  }
  return { test, run, assert, assertEq };
})();

// =================================================================
// State module — single source of truth.
// =================================================================
const State = (() => {
  const STORAGE_KEY = 'rack-designer:state:v1';
  const DEFAULT_LABEL_TEMPLATE = '{A.device}/{A.port} -> {B.device}/{B.port}';
  const listeners = new Set();
  let state = null;

  function defaultState() {
    return {
      rack: { name: 'My Rack', height_ru: 42 },
      devices: [],
      sections: [],
      cables: [],
      network: { labelTemplate: DEFAULT_LABEL_TEMPLATE }
    };
  }

  // Bring a parsed/imported state up to the current shape without mutating
  // the rack-layout fields. Networking fields were added after v1 shipped, so
  // older saves and rack-only YAML lack them.
  function normalize(s) {
    if (!Array.isArray(s.cables)) s.cables = [];
    if (!s.network || typeof s.network !== 'object') s.network = {};
    if (typeof s.network.labelTemplate !== 'string' || !s.network.labelTemplate) {
      s.network.labelTemplate = DEFAULT_LABEL_TEMPLATE;
    }
    return s;
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.rack && Array.isArray(parsed.devices) && Array.isArray(parsed.sections)) {
          state = normalize(parsed);
          return;
        }
      }
    } catch (e) { /* fall through to default */ }
    state = defaultState();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (e) { console.error('Failed to save state:', e); }
  }

  function get() { return state; }

  function setState(updater) {
    const next = typeof updater === 'function' ? updater(structuredClone(state)) : updater;
    state = next;
    save();
    listeners.forEach(fn => { try { fn(state); } catch (e) { console.error(e); } });
  }

  function onChange(fn) { listeners.add(fn); return () => listeners.delete(fn); }

  function reset() { state = defaultState(); save(); listeners.forEach(fn => fn(state)); }

  function nextDeviceId(s) {
    const nums = s.devices.map(d => parseInt((d.id || '').replace(/^dev-/, ''), 10)).filter(n => !isNaN(n));
    const max = nums.length ? Math.max(...nums) : 0;
    return 'dev-' + String(max + 1).padStart(3, '0');
  }
  function nextSectionId(s) {
    const nums = s.sections.map(d => parseInt((d.id || '').replace(/^sec-/, ''), 10)).filter(n => !isNaN(n));
    const max = nums.length ? Math.max(...nums) : 0;
    return 'sec-' + String(max + 1).padStart(3, '0');
  }
  function nextCableId(s) {
    const nums = (s.cables || []).map(c => parseInt((c.id || '').replace(/^cab-/, ''), 10)).filter(n => !isNaN(n));
    const max = nums.length ? Math.max(...nums) : 0;
    return 'cab-' + String(max + 1).padStart(3, '0');
  }

  return { load, get, setState, onChange, reset, defaultState, normalize, nextDeviceId, nextSectionId, nextCableId, DEFAULT_LABEL_TEMPLATE, STORAGE_KEY };
})();

// =================================================================
// State tests
// =================================================================
Tests.test('State.defaultState has correct shape', () => {
  const s = State.defaultState();
  Tests.assertEq(s.rack.name, 'My Rack');
  Tests.assertEq(s.rack.height_ru, 42);
  Tests.assertEq(s.devices, []);
  Tests.assertEq(s.sections, []);
});

Tests.test('State.nextDeviceId increments correctly', () => {
  Tests.assertEq(State.nextDeviceId({ devices: [] }), 'dev-001');
  Tests.assertEq(State.nextDeviceId({ devices: [{ id: 'dev-001' }, { id: 'dev-005' }] }), 'dev-006');
});

Tests.test('State.setState persists to localStorage', () => {
  // Save current state, mutate to a sentinel, verify, restore.
  const saved = localStorage.getItem(State.STORAGE_KEY);
  try {
    State.setState({ rack: { name: 'TEST', height_ru: 10 }, devices: [], sections: [] });
    const raw = JSON.parse(localStorage.getItem(State.STORAGE_KEY));
    Tests.assertEq(raw.rack.name, 'TEST');
  } finally {
    if (saved) localStorage.setItem(State.STORAGE_KEY, saved);
    else localStorage.removeItem(State.STORAGE_KEY);
    State.load();
  }
});

// =================================================================
// Palette — 32 fixed colors tuned for legibility on dark surface.
// =================================================================
const Palette = (() => {
  const COLORS = [
    '#ef4444', '#f97316', '#f59e0b', '#eab308',
    '#84cc16', '#22c55e', '#10b981', '#14b8a6',
    '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1',
    '#8b5cf6', '#a855f7', '#d946ef', '#ec4899',
    '#f43f5e', '#fb7185', '#fda4af', '#fcd34d',
    '#a3e635', '#4ade80', '#34d399', '#2dd4bf',
    '#22d3ee', '#60a5fa', '#818cf8', '#a78bfa',
    '#c084fc', '#e879f9', '#f472b6', '#94a3b8'
  ];

  function nextUnused(devices, sections) {
    const used = new Set([
      ...(devices || []).map(d => d.color),
      ...(sections || []).map(s => s.color)
    ]);
    for (const c of COLORS) if (!used.has(c)) return c;
    // All in use → wrap to first.
    return COLORS[0];
  }

  return { COLORS, nextUnused };
})();

// =================================================================
// Palette tests
// =================================================================
Tests.test('Palette has 32 colors', () => {
  Tests.assertEq(Palette.COLORS.length, 32);
});

Tests.test('Palette.nextUnused returns first when nothing used', () => {
  Tests.assertEq(Palette.nextUnused([], []), Palette.COLORS[0]);
});

Tests.test('Palette.nextUnused skips devices and sections', () => {
  const used = [{ color: Palette.COLORS[0] }];
  const usedSec = [{ color: Palette.COLORS[1] }];
  Tests.assertEq(Palette.nextUnused(used, usedSec), Palette.COLORS[2]);
});

Tests.test('Palette.nextUnused wraps to first when all in use', () => {
  const devices = Palette.COLORS.map(c => ({ color: c }));
  Tests.assertEq(Palette.nextUnused(devices, []), Palette.COLORS[0]);
});

// =================================================================
// YamlCodec — purpose-built serializer/parser for our exact schema.
// =================================================================
const YamlCodec = (() => {
  const EXPLAINER = `# Rack Designer Export — Format Guide
# ====================================================================
# A single server rack layout.
#
# rack.height_ru    : total rack units (the rack's capacity)
# rack.ru_numbering : 'bottom-up' — RU 1 is the lowest slot, height_ru is the top
#
# devices[] : items mounted in the rack. Each device has:
#   id        : stable unique identifier (string)
#   label     : human-readable name shown on the device
#   size_ru   : number of RUs the device occupies (integer >= 1)
#   position  : the LOWEST RU number the device occupies (1..height_ru)
#               A device with size_ru=2 at position=5 occupies RU 5 AND RU 6.
#   side      : 'front' — visible on front view only
#               'rear'  — visible on back view only
#               'full'  — full-depth device, visible on BOTH views
#   color     : hex color (#RRGGBB) used to render the device
#   service   : (optional) explicit service this device belongs to. If
#               omitted, service membership can be inferred from sections
#               (see below).
#   network_role : (optional) 'patch-panel' | 'switch' | 'device' — drives the
#               port-count cap in the Networking tab (48 / 50 / 16).
#   port_groups  : (optional) ordered list of typed port banks. Each item:
#                    type  : freetext port type, e.g. RJ45, "10GbE SFP+"
#                    count : number of ports in this bank
#               Ports are numbered 1..N across all groups in order. A port's
#               stable id is g{groupIndex}:{positionInGroup} (used by cables).
#
# sections[] : named groupings shown as labeled brackets alongside the rack.
#   id        : stable unique identifier
#   name      : human-readable service name
#   side      : 'front' | 'rear' | 'both' — which views show the bracket
#   ru_start  : lowest RU covered (inclusive)
#   ru_end    : highest RU covered (inclusive, >= ru_start)
#   color     : hex color for the bracket
#
# Service membership rule:
#   A device is considered part of a section when its RU range
#   [position, position + size_ru - 1] is fully contained within
#   [section.ru_start, section.ru_end] AND the device's side overlaps
#   the section's side. Devices may also declare an explicit \`service\`
#   when they sit outside any section's range.
#
# cables[] : network cables. Each cable connects endpoint A to endpoint B.
#   An endpoint is EITHER an in-rack device port (a_device + a_port, where
#   a_port is a g{group}:{pos} port id) OR a free-text destination
#   (a_external, e.g. "ISP uplink"). Same for the B side (b_*).
#   id        : stable unique identifier
#   cable_type: (optional) freetext, e.g. Cat6, OM4
#   length    : (optional) freetext, e.g. 2m
#   label     : (optional) manual label override; otherwise built from the
#               network.label_template
#   notes     : (optional) freetext
#   order     : integer sort key for the logical cable list
#
# network :
#   label_template : token template used to auto-build cable labels. Tokens:
#       {A.device} {A.id} {A.port} {A.portType} {A.role} (and {B.*}),
#       {cableType} {length}
#
# Invariants:
#   - position + size_ru - 1 <= rack.height_ru
#   - No two devices overlap on the same effective side. A 'full' device
#     blocks the RU range for both 'front' and 'rear' placements.
#   - ru_start <= ru_end <= rack.height_ru for every section.
# ====================================================================
`;

  // Quote strings that need it (anything not a bare identifier).
  const BARE_RE = /^[A-Za-z_][A-Za-z0-9_-]*$/;
  function quote(s) {
    if (s === '') return '""';
    if (BARE_RE.test(s) && !['true','false','null','yes','no','on','off'].includes(s.toLowerCase())) return s;
    return '"' + String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
  }
  function scalar(v) {
    if (typeof v === 'number' && Number.isInteger(v)) return String(v);
    return quote(String(v));
  }

  function toYaml(state) {
    let out = EXPLAINER + '\n';
    out += 'rack:\n';
    out += `  name: ${quote(state.rack.name)}\n`;
    out += `  height_ru: ${state.rack.height_ru}\n`;
    out += `  ru_numbering: bottom-up\n`;
    out += '\n';
    out += 'devices:\n';
    if (state.devices.length === 0) {
      out += '  []\n';
    } else {
      for (const d of state.devices) {
        out += `  - id: ${quote(d.id)}\n`;
        out += `    label: ${quote(d.label)}\n`;
        out += `    size_ru: ${d.size_ru}\n`;
        out += `    position: ${d.position}\n`;
        out += `    side: ${d.side}\n`;
        out += `    color: ${quote(d.color)}\n`;
        if (d.service) out += `    service: ${quote(d.service)}\n`;
        if (d.networkRole) out += `    network_role: ${d.networkRole}\n`;
        if (Array.isArray(d.portGroups) && d.portGroups.length) {
          out += `    port_groups:\n`;
          for (const g of d.portGroups) {
            out += `      - type: ${quote(String(g.type))}\n`;
            out += `        count: ${parseInt(g.count, 10) || 0}\n`;
          }
        }
      }
    }
    out += '\n';
    out += 'sections:\n';
    if (state.sections.length === 0) {
      out += '  []\n';
    } else {
      for (const s of state.sections) {
        out += `  - id: ${quote(s.id)}\n`;
        out += `    name: ${quote(s.name)}\n`;
        out += `    side: ${s.side}\n`;
        out += `    ru_start: ${s.ru_start}\n`;
        out += `    ru_end: ${s.ru_end}\n`;
        out += `    color: ${quote(s.color)}\n`;
      }
    }
    // cables[] — only emitted when the state carries the networking slice, so
    // rack-only states (and the legacy round-trip tests) are unaffected.
    if (Array.isArray(state.cables)) {
      out += '\n';
      out += 'cables:\n';
      if (state.cables.length === 0) {
        out += '  []\n';
      } else {
        const ext = e => e && typeof e.external === 'string';
        for (const c of state.cables) {
          out += `  - id: ${quote(c.id)}\n`;
          if (ext(c.a)) out += `    a_external: ${quote(c.a.external)}\n`;
          else { out += `    a_device: ${quote(c.a.deviceId)}\n`; out += `    a_port: ${quote(c.a.portKey)}\n`; }
          if (ext(c.b)) out += `    b_external: ${quote(c.b.external)}\n`;
          else { out += `    b_device: ${quote(c.b.deviceId)}\n`; out += `    b_port: ${quote(c.b.portKey)}\n`; }
          if (c.cableType) out += `    cable_type: ${quote(String(c.cableType))}\n`;
          if (c.length) out += `    length: ${quote(String(c.length))}\n`;
          if (c.label) out += `    label: ${quote(String(c.label))}\n`;
          if (c.notes) out += `    notes: ${quote(String(c.notes))}\n`;
          out += `    order: ${Number.isFinite(c.order) ? c.order : 0}\n`;
        }
      }
    }
    if (state.network) {
      out += '\n';
      out += 'network:\n';
      out += `  label_template: ${quote(String(state.network.labelTemplate || ''))}\n`;
    }
    return out;
  }

  // Parser for the restricted subset: top-level mapping with keys
  // 'rack'/'network' (nested maps), 'devices'/'sections'/'cables' (lists of
  // maps). A list item may itself contain a nested list (used by port_groups).
  // Scalars: integers, double-quoted strings, bare identifiers.
  function unquote(s) {
    s = s.trim();
    if (s === '') return '';
    if (s.startsWith('"') && s.endsWith('"')) {
      return s.slice(1, -1).replace(/\\"/g, '"').replace(/\\\\/g, '\\');
    }
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    return s; // bare identifier
  }

  // Map a raw-parsed device map onto our canonical field set/order.
  function deviceFromItem(d) {
    const out = { id: d.id, label: d.label, size_ru: d.size_ru, position: d.position, side: d.side, color: d.color };
    if (d.service != null && d.service !== '') out.service = d.service;
    if (d.network_role != null && d.network_role !== '') out.networkRole = String(d.network_role);
    if (Array.isArray(d.port_groups)) {
      out.portGroups = d.port_groups.map(g => ({ type: String(g.type), count: parseInt(g.count, 10) || 0 }));
    }
    return out;
  }

  // Map a raw-parsed cable map onto our canonical cable shape.
  function cableFromItem(it) {
    const end = (devKey, portKey, extKey) =>
      it[extKey] != null ? { external: String(it[extKey]) }
                         : { deviceId: it[devKey], portKey: String(it[portKey]) };
    const c = { id: it.id, a: end('a_device', 'a_port', 'a_external'), b: end('b_device', 'b_port', 'b_external') };
    if (it.cable_type != null && it.cable_type !== '') c.cableType = String(it.cable_type);
    if (it.length != null && it.length !== '') c.length = String(it.length);
    if (it.label != null && it.label !== '') c.label = String(it.label);
    if (it.notes != null && it.notes !== '') c.notes = String(it.notes);
    c.order = Number.isInteger(it.order) ? it.order : 0;
    return c;
  }

  function fromYaml(text) {
    // Strip comments (full-line and trailing) and blank lines.
    const rawLines = text.split(/\r?\n/);
    const lines = [];
    for (const raw of rawLines) {
      // Drop full-comment lines.
      if (/^\s*#/.test(raw)) continue;
      // Drop trailing comments — but not inside quoted strings.
      let line = raw;
      let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"' && line[i-1] !== '\\') inQ = !inQ;
        if (ch === '#' && !inQ) { line = line.slice(0, i); break; }
      }
      if (line.trim() === '') continue;
      lines.push(line.replace(/\s+$/, '')); // strip trailing whitespace
    }

    function indentOf(line) { return line.match(/^ */)[0].length; }
    function fieldMatch(s) { return s.match(/^([A-Za-z_][\w-]*):\s*(.*)$/); }

    const state = { rack: { name: 'My Rack', height_ru: 42 }, devices: [], sections: [] };
    let i = 0; // shared cursor mutated by the helpers below

    // Parse a list of "- "-prefixed map items at the given indent. Advances i.
    function parseList(itemIndent) {
      const list = [];
      while (i < lines.length && indentOf(lines[i]) >= itemIndent) {
        const itemLine = lines[i];
        const ind = indentOf(itemLine);
        if (ind === itemIndent && itemLine.trim() === '[]') { i++; break; }
        if (ind !== itemIndent || !itemLine.trim().startsWith('- ')) {
          throw new Error(`Expected list item, got: "${itemLine}"`);
        }
        list.push(parseMapItem(itemIndent));
      }
      return list;
    }

    // Parse one map item beginning with "- " at itemIndent. Fields live at
    // itemIndent+2; a field with an empty value followed by deeper "- " lines
    // is parsed as a nested list (used for port_groups). Advances i.
    function parseMapItem(itemIndent) {
      const item = {};
      const fieldIndent = itemIndent + 2;
      const fm = fieldMatch(lines[i].trim().slice(2));
      if (!fm) throw new Error(`Unparseable first list field: "${lines[i]}"`);
      i++;
      assignField(item, fm[1], fm[2], fieldIndent);
      while (i < lines.length && indentOf(lines[i]) >= fieldIndent && !lines[i].trim().startsWith('-')) {
        const subm = fieldMatch(lines[i].trim());
        if (!subm) throw new Error(`Unparseable list field line: "${lines[i]}"`);
        i++;
        assignField(item, subm[1], subm[2], fieldIndent);
      }
      return item;
    }

    function assignField(item, key, valStr, fieldIndent) {
      if (valStr === '' && i < lines.length && indentOf(lines[i]) > fieldIndent && lines[i].trim().startsWith('- ')) {
        item[key] = parseList(indentOf(lines[i]));
      } else {
        item[key] = unquote(valStr);
      }
    }

    while (i < lines.length) {
      const line = lines[i];
      const ind = indentOf(line);
      if (ind !== 0) throw new Error(`Unexpected indent at top level: "${line}"`);
      const m = fieldMatch(line);
      if (!m) throw new Error(`Unparseable top-level line: "${line}"`);
      const key = m[1];
      const rest = m[2].trim();
      i++;
      if (key === 'rack' || key === 'network') {
        // Nested map at indent 2.
        const map = {};
        while (i < lines.length && indentOf(lines[i]) >= 2) {
          const subm = fieldMatch(lines[i].trim());
          if (!subm) throw new Error(`Unparseable ${key} line: "${lines[i]}"`);
          map[subm[1]] = unquote(subm[2]);
          i++;
        }
        if (key === 'rack') {
          if (typeof map.name !== 'string') throw new Error('rack.name missing or invalid');
          if (typeof map.height_ru !== 'number') throw new Error('rack.height_ru missing or invalid');
          state.rack = { name: map.name, height_ru: map.height_ru };
        } else {
          state.network = { labelTemplate: map.label_template != null ? String(map.label_template) : '' };
        }
      } else if (key === 'devices' || key === 'sections' || key === 'cables') {
        const list = rest === '[]' ? [] : parseList(2);
        if (key === 'devices') state.devices = list.map(deviceFromItem);
        else if (key === 'cables') state.cables = list.map(cableFromItem);
        else state.sections = list;
      } else {
        throw new Error(`Unknown top-level key: "${key}"`);
      }
    }

    return state;
  }

  return { EXPLAINER, toYaml, fromYaml };
})();

// =================================================================
// Validation — pure functions over state.
// =================================================================
const Validation = (() => {
  // Effective side sets.
  function sidesOf(side) {
    if (side === 'front') return new Set(['front']);
    if (side === 'rear') return new Set(['rear']);
    if (side === 'full') return new Set(['front', 'rear']);
    return new Set();
  }

  function rangeOf(device) {
    return { lo: device.position, hi: device.position + device.size_ru - 1 };
  }

  // Two devices conflict iff their RU ranges intersect AND their effective
  // side sets intersect.
  function conflicts(a, b) {
    const ra = rangeOf(a), rb = rangeOf(b);
    if (ra.hi < rb.lo || rb.hi < ra.lo) return false;
    const sa = sidesOf(a.side), sb = sidesOf(b.side);
    for (const s of sa) if (sb.has(s)) return true;
    return false;
  }

  // Returns array of error strings; empty array means valid.
  function validateState(state) {
    const errors = [];
    const H = state.rack.height_ru;
    if (!Number.isInteger(H) || H < 1 || H > 96) errors.push(`rack.height_ru must be 1..96, got ${H}`);

    for (const d of state.devices) {
      if (!Number.isInteger(d.size_ru) || d.size_ru < 1) errors.push(`device ${d.id}: size_ru must be >= 1`);
      if (!Number.isInteger(d.position) || d.position < 1) errors.push(`device ${d.id}: position must be >= 1`);
      if (d.position + d.size_ru - 1 > H) errors.push(`device ${d.id}: extends beyond rack (position=${d.position}, size=${d.size_ru}, rack=${H})`);
      if (!['front','rear','full'].includes(d.side)) errors.push(`device ${d.id}: invalid side "${d.side}"`);
    }
    for (let i = 0; i < state.devices.length; i++) {
      for (let j = i + 1; j < state.devices.length; j++) {
        if (conflicts(state.devices[i], state.devices[j])) {
          errors.push(`devices ${state.devices[i].id} and ${state.devices[j].id} overlap`);
        }
      }
    }
    for (const s of state.sections) {
      if (!Number.isInteger(s.ru_start) || !Number.isInteger(s.ru_end)) errors.push(`section ${s.id}: ru_start/ru_end must be integers`);
      if (s.ru_start < 1 || s.ru_end > H || s.ru_start > s.ru_end) errors.push(`section ${s.id}: range invalid (${s.ru_start}..${s.ru_end}, rack=${H})`);
      if (!['front','rear','both'].includes(s.side)) errors.push(`section ${s.id}: invalid side "${s.side}"`);
    }
    return errors;
  }

  // Test if placing a candidate device would conflict with any existing.
  // `ignoreId` lets you exclude a device being moved.
  function canPlace(state, candidate, ignoreId) {
    const H = state.rack.height_ru;
    if (candidate.position < 1) return false;
    if (candidate.position + candidate.size_ru - 1 > H) return false;
    for (const d of state.devices) {
      if (ignoreId && d.id === ignoreId) continue;
      if (conflicts(d, candidate)) return false;
    }
    return true;
  }

  // Containment-based section membership: device is in section if its full
  // RU range is inside the section's range AND its effective side set
  // overlaps the section's side set.
  function isDeviceInSection(device, section) {
    const dr = rangeOf(device);
    if (dr.lo < section.ru_start || dr.hi > section.ru_end) return false;
    const ds = sidesOf(device.side);
    const ss = section.side === 'both' ? new Set(['front','rear']) :
               section.side === 'front' ? new Set(['front']) : new Set(['rear']);
    for (const s of ds) if (ss.has(s)) return true;
    return false;
  }

  return { sidesOf, rangeOf, conflicts, validateState, canPlace, isDeviceInSection };
})();

// =================================================================
// Net — networking model. Ports are DERIVED from each device's
// portGroups; cables connect a stable port key (or a free-text
// external endpoint) on one device to another. Pure, no DOM.
// =================================================================
const Net = (() => {
  // Per-role port limits. Patch panels are a single bank; switches and
  // generic devices may have multiple typed groups (e.g. 48x RJ45 + 4x SFP+).
  const CAPS = {
    'patch-panel': { min: 1, max: 48, multiGroup: false, defaultType: 'RJ45' },
    'switch':      { min: 1, max: 50, multiGroup: true,  defaultType: 'RJ45' },
    'device':      { min: 0, max: 16, multiGroup: true,  defaultType: 'RJ45' }
  };
  const ROLES = ['patch-panel', 'switch', 'device'];

  function inferRole(label) {
    const s = String(label || '');
    if (/patch\s*panel/i.test(s)) return 'patch-panel';
    if (/switch/i.test(s)) return 'switch';
    return 'device';
  }

  // Give a device sane networking defaults at read/edit time (legacy devices
  // and rack-only YAML lack them). Mutates and returns the same object.
  function ensureDeviceDefaults(device) {
    if (!device) return device;
    if (!ROLES.includes(device.networkRole)) device.networkRole = inferRole(device.label);
    if (!Array.isArray(device.portGroups)) device.portGroups = [];
    return device;
  }

  // Flatten port groups into a numbered, stably-keyed port list. The key
  // 'g{groupIndex}:{posInGroup}' is durable; the 1..N index is cosmetic.
  function portsOf(device) {
    const groups = (device && Array.isArray(device.portGroups)) ? device.portGroups : [];
    const ports = [];
    let index = 0;
    groups.forEach((g, gi) => {
      const count = Math.max(0, Math.floor(Number(g.count) || 0));
      const type = String(g.type || '');
      for (let p = 1; p <= count; p++) {
        index++;
        ports.push({ key: `g${gi}:${p}`, index, type, groupIndex: gi, posInGroup: p });
      }
    });
    return ports;
  }

  function portCount(device) { return portsOf(device).length; }

  // Resolve a stable port key against a device's CURRENT groups.
  function resolvePort(device, portKey) {
    if (!device) return { ok: false, reason: 'device missing' };
    const m = /^g(\d+):(\d+)$/.exec(String(portKey || ''));
    if (!m) return { ok: false, reason: 'bad port key' };
    const gi = parseInt(m[1], 10), pos = parseInt(m[2], 10);
    const found = portsOf(device).find(p => p.groupIndex === gi && p.posInGroup === pos);
    if (!found) return { ok: false, reason: 'port no longer exists' };
    return { ok: true, index: found.index, type: found.type };
  }

  function deviceById(state, id) {
    return (state.devices || []).find(d => d.id === id) || null;
  }

  function validatePortGroups(role, groups) {
    const errors = [];
    const cap = CAPS[role] || CAPS['device'];
    if (!Array.isArray(groups)) return ['port groups must be a list'];
    if (!cap.multiGroup && groups.length > 1) errors.push(`${role} supports a single port group`);
    let total = 0;
    groups.forEach((g, i) => {
      const c = Number(g.count);
      if (!Number.isInteger(c) || c < 0) errors.push(`group ${i + 1}: count must be a non-negative integer`);
      else total += c;
      if (g.type == null || String(g.type).trim() === '') errors.push(`group ${i + 1}: type is required`);
    });
    if (total < cap.min) errors.push(`total ports must be at least ${cap.min} for ${role}`);
    if (total > cap.max) errors.push(`total ports must be at most ${cap.max} for ${role}`);
    return errors;
  }

  // ---- Endpoints & cables ----
  function isExternal(end) { return !!(end && typeof end.external === 'string'); }

  function endpointInfo(state, end) {
    if (isExternal(end)) {
      return { ok: true, external: true, device: end.external, id: '', port: '', portType: '', role: '' };
    }
    const dev = deviceById(state, end ? end.deviceId : null);
    if (!dev) return { ok: false, external: false, device: '?', id: (end && end.deviceId) || '', port: '?', portType: '', role: '' };
    const r = resolvePort(dev, end.portKey);
    return {
      ok: r.ok, external: false,
      device: dev.label, id: dev.id,
      port: r.ok ? String(r.index) : '?',
      portType: r.ok ? r.type : '',
      role: dev.networkRole || inferRole(dev.label)
    };
  }

  // Short human label for an endpoint, used in the cable list UI.
  function endpointLabel(state, end) {
    const info = endpointInfo(state, end);
    return info.external ? info.device : `${info.device} p${info.port}`;
  }

  function cableStatus(state, cable) {
    for (const e of [cable.a, cable.b]) {
      if (isExternal(e)) continue;
      const dev = deviceById(state, e ? e.deviceId : null);
      if (!dev) return { status: 'broken', reason: 'device deleted' };
      const r = resolvePort(dev, e.portKey);
      if (!r.ok) return { status: 'broken', reason: r.reason };
    }
    return { status: 'ok', reason: '' };
  }

  // Build a cable label from a template with {A.*}/{B.*} tokens. Broken
  // endpoints render their port as '?'; unknown tokens render empty.
  function renderLabel(state, cable, template) {
    const tpl = template != null ? template : ((state.network && state.network.labelTemplate) || '');
    const A = endpointInfo(state, cable.a);
    const B = endpointInfo(state, cable.b);
    const map = {
      'A.device': A.device, 'A.id': A.id, 'A.port': A.port, 'A.portType': A.portType, 'A.role': A.role,
      'B.device': B.device, 'B.id': B.id, 'B.port': B.port, 'B.portType': B.portType, 'B.role': B.role,
      'cableType': cable.cableType || '', 'length': cable.length || ''
    };
    return String(tpl).replace(/\{([^}]+)\}/g, (m, key) => {
      const k = key.trim();
      return Object.prototype.hasOwnProperty.call(map, k) ? String(map[k]) : '';
    });
  }

  // Resolved label: a manual override wins; otherwise apply the template.
  function effectiveLabel(state, cable) {
    if (cable.label != null && cable.label !== '') return cable.label;
    return renderLabel(state, cable, state.network && state.network.labelTemplate);
  }

  // Stable sort: explicit cable.order first, then logical wiring order
  // (A device, A port, B device, B port).
  function sortCables(state) {
    const keyOf = end => {
      if (isExternal(end)) return { dev: '~' + end.external, port: 0 };
      const dev = deviceById(state, end ? end.deviceId : null);
      const r = dev ? resolvePort(dev, end.portKey) : { ok: false };
      return { dev: (end && end.deviceId) || '', port: r.ok ? r.index : 9999 };
    };
    return (state.cables || []).map((c, i) => ({ c, i })).sort((x, y) => {
      const ox = Number.isFinite(x.c.order) ? x.c.order : x.i;
      const oy = Number.isFinite(y.c.order) ? y.c.order : y.i;
      if (ox !== oy) return ox - oy;
      const ax = keyOf(x.c.a), ay = keyOf(y.c.a);
      if (ax.dev !== ay.dev) return ax.dev < ay.dev ? -1 : 1;
      if (ax.port !== ay.port) return ax.port - ay.port;
      const bx = keyOf(x.c.b), by = keyOf(y.c.b);
      if (bx.dev !== by.dev) return bx.dev < by.dev ? -1 : 1;
      if (bx.port !== by.port) return bx.port - by.port;
      return x.i - y.i;
    }).map(o => o.c);
  }

  // ---- CSV (RFC 4180) ----
  function csvField(v) {
    const s = v == null ? '' : String(v);
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }
  function toCsv(state) {
    const header = ['Order','Label','A','A Port','B','B Port','Cable Type','Length','Notes','Status'];
    const rows = [header];
    sortCables(state).forEach(c => {
      const A = endpointInfo(state, c.a);
      const B = endpointInfo(state, c.b);
      rows.push([
        Number.isFinite(c.order) ? c.order : '',
        effectiveLabel(state, c),
        A.device, A.external ? '' : A.port,
        B.device, B.external ? '' : B.port,
        c.cableType || '', c.length || '', c.notes || '',
        cableStatus(state, c).status
      ]);
    });
    return rows.map(r => r.map(csvField).join(',')).join('\r\n');
  }

  // When importing rack-only YAML (older files with no networking), carry the
  // previous networking data forward by device id and drop cables whose
  // in-rack endpoint no longer exists. New-format imports already carry it.
  function mergeNetworkingAfterImport(prev, imported) {
    const out = imported;
    const hasNet = (out.devices || []).some(d => Array.isArray(d.portGroups) && d.portGroups.length) ||
                   (Array.isArray(out.cables) && out.cables.length);
    if (!hasNet) {
      const prevById = new Map((prev.devices || []).map(d => [d.id, d]));
      (out.devices || []).forEach(d => {
        const p = prevById.get(d.id);
        if (!p) return;
        if (p.networkRole && d.networkRole == null) d.networkRole = p.networkRole;
        if (Array.isArray(p.portGroups) && !Array.isArray(d.portGroups)) d.portGroups = structuredClone(p.portGroups);
      });
      const liveIds = new Set((out.devices || []).map(d => d.id));
      out.cables = (prev.cables || []).filter(c =>
        (isExternal(c.a) || liveIds.has(c.a.deviceId)) &&
        (isExternal(c.b) || liveIds.has(c.b.deviceId)));
    }
    return State.normalize(out);
  }

  return {
    CAPS, ROLES, inferRole, ensureDeviceDefaults, portsOf, portCount, resolvePort, deviceById,
    validatePortGroups, isExternal, endpointInfo, endpointLabel, cableStatus, renderLabel,
    effectiveLabel, sortCables, csvField, toCsv, mergeNetworkingAfterImport
  };
})();

// =================================================================
// Net tests
// =================================================================
Tests.test('Net.inferRole maps label keywords', () => {
  Tests.assertEq(Net.inferRole('Patch panel 1U'), 'patch-panel');
  Tests.assertEq(Net.inferRole('Core Switch'), 'switch');
  Tests.assertEq(Net.inferRole('Server 2U'), 'device');
});

Tests.test('Net.portsOf flattens groups in order with stable keys', () => {
  const dev = { portGroups: [{ type: 'RJ45', count: 48 }, { type: 'SFP+', count: 4 }] };
  const ports = Net.portsOf(dev);
  Tests.assertEq(ports.length, 52);
  Tests.assertEq(ports[0].key, 'g0:1');
  Tests.assertEq(ports[47].index, 48);
  Tests.assertEq(ports[48].key, 'g1:1');
  Tests.assertEq(ports[48].index, 49);
  Tests.assertEq(ports[51].type, 'SFP+');
});

Tests.test('Net.validatePortGroups enforces role caps', () => {
  Tests.assert(Net.validatePortGroups('patch-panel', [{ type: 'RJ45', count: 49 }]).length > 0);
  Tests.assert(Net.validatePortGroups('patch-panel', [{ type: 'a', count: 1 }, { type: 'b', count: 1 }]).length > 0);
  Tests.assert(Net.validatePortGroups('switch', [{ type: 'a', count: 48 }, { type: 'b', count: 4 }]).length > 0);
  Tests.assertEq(Net.validatePortGroups('switch', [{ type: 'a', count: 48 }, { type: 'b', count: 2 }]), []);
  Tests.assert(Net.validatePortGroups('device', [{ type: 'a', count: 17 }]).length > 0);
  Tests.assertEq(Net.validatePortGroups('device', []), []);
});

Tests.test('Net.resolvePort: appending a group keeps existing keys stable', () => {
  const dev = { portGroups: [{ type: 'RJ45', count: 4 }] };
  Tests.assert(Net.resolvePort(dev, 'g0:3').ok);
  dev.portGroups.push({ type: 'SFP+', count: 2 });
  Tests.assertEq(Net.resolvePort(dev, 'g0:3').index, 3);
  Tests.assertEq(Net.resolvePort(dev, 'g1:2').index, 6);
});

Tests.test('Net.resolvePort: shrinking a group breaks the removed port', () => {
  const dev = { portGroups: [{ type: 'RJ45', count: 4 }] };
  Tests.assert(Net.resolvePort(dev, 'g0:3').ok);
  dev.portGroups[0].count = 2;
  Tests.assert(!Net.resolvePort(dev, 'g0:3').ok);
  Tests.assert(Net.resolvePort(dev, 'g0:1').ok);
});

Tests.test('Net.cableStatus: ok in-rack, broken after shrink, external always ok', () => {
  const state = {
    devices: [{ id: 'dev-001', label: 'Sw', networkRole: 'switch', portGroups: [{ type: 'RJ45', count: 4 }] }],
    cables: []
  };
  const cable = { a: { deviceId: 'dev-001', portKey: 'g0:3' }, b: { external: 'ISP uplink' } };
  Tests.assertEq(Net.cableStatus(state, cable).status, 'ok');
  state.devices[0].portGroups[0].count = 2;
  Tests.assertEq(Net.cableStatus(state, cable).status, 'broken');
  const ext = { a: { external: 'A' }, b: { external: 'B' } };
  Tests.assertEq(Net.cableStatus(state, ext).status, 'ok');
});

Tests.test('Net.renderLabel substitutes tokens and marks broken ports', () => {
  const state = {
    devices: [{ id: 'dev-001', label: 'Switch', networkRole: 'switch', portGroups: [{ type: 'RJ45', count: 4 }] }],
    network: { labelTemplate: '{A.device} p{A.port} <-> {B.device}' }
  };
  const cable = { a: { deviceId: 'dev-001', portKey: 'g0:2' }, b: { external: 'ISP uplink' } };
  Tests.assertEq(Net.renderLabel(state, cable, state.network.labelTemplate), 'Switch p2 <-> ISP uplink');
  state.devices[0].portGroups[0].count = 1;
  Tests.assertEq(Net.renderLabel(state, cable, state.network.labelTemplate), 'Switch p? <-> ISP uplink');
});

Tests.test('Net.csvField escapes per RFC 4180', () => {
  Tests.assertEq(Net.csvField('plain'), 'plain');
  Tests.assertEq(Net.csvField('a"b'), '"a""b"');
  Tests.assertEq(Net.csvField('a,b'), '"a,b"');
  Tests.assertEq(Net.csvField('a\nb'), '"a\nb"');
});

Tests.test('Net.toCsv produces header + one row per cable', () => {
  const state = {
    devices: [{ id: 'dev-001', label: 'Sw', networkRole: 'switch', portGroups: [{ type: 'RJ45', count: 4 }] }],
    network: { labelTemplate: '{A.device}/{A.port}' },
    cables: [
      { id: 'cab-001', order: 1, a: { deviceId: 'dev-001', portKey: 'g0:1' }, b: { external: 'X' } },

    ]
  };
  const lines = Net.toCsv(state).split('\r\n');

});

Tests.test('Net.sortCables honors explicit order', () => {
  const state = {
    devices: [],
    cables: [
      { id: 'cab-001', order: 2, a: { external: 'a' }, b: { external: 'b' } },
      { id: 'cab-002', order: 1, a: { external: 'c' }, b: { external: 'd' } }
    ]
  };
  const sorted = Net.sortCables(state);

Tests.test('Net.mergeNetworkingAfterImport restores by id and drops orphans', () => {
  const prev = {
    rack: { name: 'X', height_ru: 42 },
    devices: [
      { id: 'dev-001', label: 'Sw', networkRole: 'switch', portGroups: [{ type: 'RJ45', count: 4 }] },
      { id: 'dev-002', label: 'PP', networkRole: 'patch-panel', portGroups: [{ type: 'RJ45', count: 24 }] }
    ],
    sections: [],
    cables: [
      { id: 'cab-001', order: 1, a: { deviceId: 'dev-001', portKey: 'g0:1' }, b: { deviceId: 'dev-002', portKey: 'g0:1' } },
      { id: 'cab-002', order: 2, a: { deviceId: 'dev-002', portKey: 'g0:2' }, b: { external: 'wall' } }
