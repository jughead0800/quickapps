// =================================================================
// Renderer — pure function of state, rebuilds DOM on every change.
// =================================================================
const Renderer = (() => {
  function el(tag, opts = {}, children = []) {
    const e = document.createElement(tag);
    if (opts.cls) e.className = opts.cls;
    if (opts.id) e.id = opts.id;
    if (opts.text != null) e.textContent = opts.text;
    if (opts.html != null) e.innerHTML = opts.html;
    if (opts.attrs) for (const [k, v] of Object.entries(opts.attrs)) e.setAttribute(k, v);
    if (opts.style) for (const [k, v] of Object.entries(opts.style)) e.style[k] = v;
    if (opts.on) for (const [k, fn] of Object.entries(opts.on)) e.addEventListener(k, fn);
    for (const c of children) if (c != null) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    return e;
  }

  const PRESETS = [
    { name: 'Server 1U', size_ru: 1 },
    { name: 'Server 2U', size_ru: 2 },
    { name: 'Server 4U', size_ru: 4 },
    { name: 'Switch 1U', size_ru: 1 },
    { name: 'Patch panel 1U', size_ru: 1 },
    { name: 'PDU 1U', size_ru: 1 }
  ];

  function renderToolbar(state) {
    const box = document.getElementById('toolbar');
    box.replaceChildren(
      el('div', { cls: 'field' }, [
        el('label', { text: 'Rack name', cls: 'lbl' }),
        el('input', {
          attrs: { type: 'text', value: state.rack.name },
          on: { change: e => State.setState(s => { s.rack.name = e.target.value; return s; }) }
        })
      ]),
      el('div', { cls: 'field' }, [
        el('label', { text: 'Height (RU)', cls: 'lbl' }),
        el('input', {
          attrs: { type: 'number', min: '1', max: '96', value: String(state.rack.height_ru) },
          on: { change: e => {
            const v = parseInt(e.target.value, 10);
            if (isNaN(v) || v < 1 || v > 96) { e.target.value = String(state.rack.height_ru); return; }
            const cur = State.get();
            const overflowingDev = cur.devices.find(d => d.position + d.size_ru - 1 > v);
            const overflowingSec = cur.sections.find(s => s.ru_end > v);
            if (overflowingDev || overflowingSec) {
              const what = overflowingDev ? `device "${overflowingDev.label}"` : `section "${overflowingSec.name}"`;
              alert(`Cannot shrink to ${v} RU: ${what} extends beyond. Move or delete it first.`);
              e.target.value = String(cur.rack.height_ru);
              return;
            }
            State.setState(s => { s.rack.height_ru = v; return s; });
          }}
        })
      ]),
      (() => {
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = Settings.get('scrollLock');
        cb.addEventListener('change', e => Settings.set('scrollLock', e.target.checked));
        const label = el('label', { cls: 'check-row' }, [cb, ' Lock scroll (front/back)']);
        return el('div', { cls: 'field' }, [label]);
      })(),
      el('div', { cls: 'btn-row' }, [
        el('button', { text: 'Export YAML', cls: 'btn', attrs: { id: 'btn-export' } }),
        el('button', { text: 'Import YAML', cls: 'btn', attrs: { id: 'btn-import' } })
      ]),
      el('div', { cls: 'btn-row' }, [
        el('button', { text: '+ Custom device', cls: 'btn', attrs: { id: 'btn-custom' } }),
        el('button', { text: '+ Section', cls: 'btn', attrs: { id: 'btn-section' } })
      ])
    );
  }

  function renderPresets() {
    const box = document.getElementById('presets');
    box.replaceChildren(
      ...PRESETS.map(p => el('div', {
        cls: 'preset',
        attrs: { 'data-preset-name': p.name, 'data-preset-size': String(p.size_ru) },
        text: p.name
      }))
    );
  }

  function renderRack(side, state) {
    const rack = document.getElementById(side === 'front' ? 'front-rack' : 'rear-rack');
    rack.replaceChildren();
    const H = state.rack.height_ru;
    // Map RU number -> device occupying its bottom (only one per RU per side).
    const bottomOf = new Map();
    for (const d of state.devices) {
      const sides = Validation.sidesOf(d.side);
      if (!sides.has(side)) continue;
      bottomOf.set(d.position, d);
    }
    // Track RUs already covered by a multi-RU device starting below.
    const covered = new Set();
    for (let ru = 1; ru <= H; ru++) {
      const row = el('div', {
        cls: `ru-row ${side}`,
        attrs: { 'data-ru': String(ru), 'data-side': side }
      }, [el('span', { cls: 'ru-num', text: String(ru) })]);

      if (covered.has(ru)) {
        // This RU is the middle/top of a multi-RU device drawn at its bottom.
        // Leave the row mostly empty (RU number still shows).
        row.classList.add('ru-covered');
      } else if (bottomOf.has(ru)) {
        const d = bottomOf.get(ru);
        // Compute border tint from sections that fully contain this device.
        const tintSection = state.sections.find(s => Validation.isDeviceInSection(d, s));
        const tile = el('div', {
          cls: 'device-tile',
          attrs: { 'data-device-id': d.id },
          style: {
            background: d.color,
            // Tile spans (size_ru) rows but is drawn inside the bottom row,
            // visually extending upward via height. Since the rack uses
            // column-reverse, we set height to size_ru * row height and
            // absolutely position upward.
            height: `calc(var(--ru-height) * ${d.size_ru} - 2px)`,
            borderLeft: tintSection ? `2px solid ${tintSection.color}` : '0'
          },
          text: d.label
        });
        row.appendChild(tile);
        // Mark the RUs above this one as covered.
        for (let k = 1; k < d.size_ru; k++) covered.add(ru + k);
      }
      rack.appendChild(row);
    }
  }

  function renderGutter(side, state) {
    const gutter = document.getElementById(side === 'front' ? 'front-gutter' : 'rear-gutter');
    gutter.replaceChildren();
    const H = state.rack.height_ru;
    const rackEl = document.getElementById(side === 'front' ? 'front-rack' : 'rear-rack');
    // Match the rack's effective row height including its 6px padding-top inside.
    const rackPaddingTop = 6;

    // Filter sections visible on this side.
    const visible = state.sections.filter(s => s.side === 'both' || s.side === side);
    // To handle overlapping brackets, lay out in columns. Simple greedy: assign each section to the first column where it doesn't overlap an already-placed section.
    const cols = [];
    for (const sec of visible) {
      let placed = false;
      for (const col of cols) {
        const overlaps = col.some(s2 => !(sec.ru_end < s2.ru_start || s2.ru_end < sec.ru_start));
        if (!overlaps) { col.push(sec); placed = true; break; }
      }
      if (!placed) cols.push([sec]);
    }

    const colWidth = 14;
    gutter.style.position = 'relative';
    // Match the rack's vertical layout: column-reverse means RU 1 sits at the bottom.
    // We position bars by computing the bottom offset of ru_start.
    // RU number r occupies rows from bottom upward: bottom_offset = (r - 1) * rowH + rackPaddingTop.
    // bracket height = (ru_end - ru_start + 1) * rowH.
    const rowH = 26; // matches --ru-height

    cols.forEach((col, ci) => {
      for (const sec of col) {
        const bar = document.createElement('div');
        bar.className = 'section-bar';
        bar.setAttribute('data-section-id', sec.id);
        const bottom = (sec.ru_start - 1) * rowH + rackPaddingTop + 1; // +1 for rack border
        const height = (sec.ru_end - sec.ru_start + 1) * rowH - 2;
        bar.style.bottom = bottom + 'px';
        bar.style.height = height + 'px';
        bar.style.background = sec.color;
        if (side === 'front') bar.style.right = (4 + ci * colWidth) + 'px';
        else bar.style.left = (4 + ci * colWidth) + 'px';
        bar.title = sec.name;
        const lbl = document.createElement('span');
        lbl.className = 'section-label';
        lbl.textContent = sec.name;
        bar.appendChild(lbl);
        gutter.appendChild(bar);
      }
    });
  }

  function renderAll() {
    const state = State.get();
    renderToolbar(state);
    renderPresets();
    renderRack('front', state);
    renderRack('rear', state);
    renderGutter('front', state);
    renderGutter('rear', state);
  }

  return { renderAll, el };
})();

// =================================================================
// DragController — pointer-event based; handles palette→rack and
// in-rack repositioning (in-rack drag added in Task 10).
// =================================================================
const DragController = (() => {
  let dragging = null; // { kind: 'preset'|'device', size_ru, label, color, sourceId?, ghost, originX, originY }
  let lastTarget = null; // { rack, side, ru, ok }

  function findRuUnderCursor(clientX, clientY) {
    const el = document.elementFromPoint(clientX, clientY);
    if (!el) return null;
    const row = el.closest('.ru-row');
    if (!row) return null;
    return {
      side: row.getAttribute('data-side'),
      ru: parseInt(row.getAttribute('data-ru'), 10),
      row
    };
  }

  function clearPreview() {
    document.querySelectorAll('.ru-row.preview-ok, .ru-row.preview-bad')
      .forEach(r => r.classList.remove('preview-ok', 'preview-bad'));
  }

  function showPreview(side, bottomRu, size, ok) {
    clearPreview();
    const rackId = side === 'front' ? 'front-rack' : 'rear-rack';
    const rack = document.getElementById(rackId);
    for (let k = 0; k < size; k++) {
      const row = rack.querySelector(`.ru-row[data-ru="${bottomRu + k}"]`);
      if (row) row.classList.add(ok ? 'preview-ok' : 'preview-bad');
    }
  }

  function makeGhost(label, color, size_ru) {
    const g = document.createElement('div');
    g.className = 'drag-ghost';
    g.textContent = label;
    g.style.background = color;
    g.style.height = `calc(var(--ru-height) * ${size_ru} - 2px)`;
    document.body.appendChild(g);
    return g;
  }

  function onPointerMove(e) {
    if (!dragging) return;
    dragging.ghost.style.left = (e.clientX + 8) + 'px';
    dragging.ghost.style.top = (e.clientY + 8) + 'px';
    const t = findRuUnderCursor(e.clientX, e.clientY);
    if (!t) { clearPreview(); lastTarget = null; return; }
    const candidate = {
      id: dragging.sourceId || '__candidate__',
      size_ru: dragging.size_ru, position: t.ru, side: t.side,
      label: '', color: ''
    };
    const ok = Validation.canPlace(State.get(), candidate, dragging.sourceId);
    showPreview(t.side, t.ru, dragging.size_ru, ok);
    lastTarget = { side: t.side, ru: t.ru, ok };
  }

  function onPointerUp(e) {
    if (!dragging) return;
    if (lastTarget && lastTarget.ok) {
      if (dragging.kind === 'preset') {
        State.setState(s => {
          s.devices.push({
            id: State.nextDeviceId(s),
            label: dragging.label,
            size_ru: dragging.size_ru,
            position: lastTarget.ru,
            side: lastTarget.side,
            color: Palette.nextUnused(s.devices, s.sections),
            networkRole: Net.inferRole(dragging.label),
            portGroups: []
          });
          return s;
        });
      } else if (dragging.kind === 'device') {
        State.setState(s => {
          const d = s.devices.find(x => x.id === dragging.sourceId);
          if (d) {
            d.position = lastTarget.ru;
            // Preserve 'full' across side flips; otherwise adopt target side.
            if (d.side !== 'full') d.side = lastTarget.side;
          }
          return s;
        });
      }
    }
    cleanup();
  }

  function cleanup() {
    if (dragging && dragging.ghost) dragging.ghost.remove();
    document.querySelectorAll('.dragging').forEach(e => e.classList.remove('dragging'));
    clearPreview();
    dragging = null;
    lastTarget = null;
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
  }

  function attachPresetDrag() {
    document.getElementById('presets').addEventListener('pointerdown', e => {
      const tile = e.target.closest('.preset');
      if (!tile) return;
      e.preventDefault();
      const label = tile.getAttribute('data-preset-name');
      const size_ru = parseInt(tile.getAttribute('data-preset-size'), 10);
      const color = Palette.nextUnused(State.get().devices, State.get().sections);
      tile.classList.add('dragging');
      const ghost = makeGhost(label, color, size_ru);
      dragging = { kind: 'preset', label, size_ru, color, ghost };
      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp);
    });
  }

  function attachDeviceDrag() {
    let pendingTile = null;
    let downX = 0, downY = 0, moved = false;

    document.addEventListener('pointerdown', e => {
      const tile = e.target.closest('.device-tile');
      if (!tile) return;
      if (e.target.closest('.popover')) return;
      e.preventDefault();
      pendingTile = tile;
      downX = e.clientX; downY = e.clientY; moved = false;

      const startDrag = () => {
        const deviceId = tile.getAttribute('data-device-id');
        const d = State.get().devices.find(x => x.id === deviceId);
        if (!d) return;
        tile.classList.add('dragging');
        const ghost = makeGhost(d.label, d.color, d.size_ru);
        dragging = { kind: 'device', label: d.label, size_ru: d.size_ru, color: d.color, sourceId: d.id, ghost };
      };

      const moveCheck = mv => {
        if (Math.abs(mv.clientX - downX) > 4 || Math.abs(mv.clientY - downY) > 4) {
          moved = true;
          document.removeEventListener('pointermove', moveCheck);
          // Swap the pending click handler for the real drag-release handler
          // BEFORE the user lifts the pointer, otherwise the new listener
          // wouldn't fire for the in-flight pointerup event.
          document.removeEventListener('pointerup', upCheck);
          startDrag();
          document.addEventListener('pointermove', onPointerMove);
          document.addEventListener('pointerup', onPointerUp);
          // Trigger first preview update immediately.
          onPointerMove(mv);
        }
      };
      const upCheck = () => {
        // moveCheck swaps us out before pointerup if a drag started, so by
        // the time we run we know it was a click.
        document.removeEventListener('pointermove', moveCheck);
        document.removeEventListener('pointerup', upCheck);
        openDeviceEditor(tile);
        pendingTile = null;
      };
      document.addEventListener('pointermove', moveCheck);
      document.addEventListener('pointerup', upCheck);
    });
  }

  function openDeviceEditor(tile) {
    document.querySelectorAll('.device-tile.selected').forEach(t => t.classList.remove('selected'));
    tile.classList.add('selected');
    const deviceId = tile.getAttribute('data-device-id');
    const d = State.get().devices.find(x => x.id === deviceId);
    if (!d) return;
    Popover.open(tile, `Edit device (${d.id})`, [
      { key: 'label', label: 'Label', type: 'text', value: d.label },
      { key: 'size_ru', label: 'Size (U)', type: 'number', min: 1, max: 10, value: d.size_ru },
      { key: 'side', label: 'Side', type: 'radio', options: ['front','rear','full'], value: d.side },
      { key: 'color', label: 'Color', type: 'color', value: d.color },
      { key: 'service', label: 'Service (optional)', type: 'text', value: d.service || '' }
    ],
    values => {
      State.setState(s => {
        const dev = s.devices.find(x => x.id === d.id);
        if (!dev) return s;
        const candidate = { ...dev, label: values.label, size_ru: values.size_ru, side: values.side, color: values.color };
        if (!Validation.canPlace(s, candidate, dev.id)) {
          alert('Cannot apply: device would overlap or extend beyond the rack at its current position.');
          return s;
        }
        dev.label = values.label;
        dev.size_ru = values.size_ru;
        dev.side = values.side;
        dev.color = values.color;
        if (values.service && values.service.trim()) dev.service = values.service.trim();
        else delete dev.service;
        return s;
      });
    },
    () => {
      if (!confirm(`Delete device "${d.label}"?`)) return;
      State.setState(s => { s.devices = s.devices.filter(x => x.id !== d.id); return s; });
    },
    [{ text: 'Networking →', cls: 'btn', onClick: () => { View.set('networking'); NetRenderer.openDeviceTab(d.id); } }]);
  }

  function addCustomDevice() {
    const s = State.get();
    const H = s.rack.height_ru;
    // Find the lowest free RU on the front side for a 1U device.
    let placed = null;
    for (let ru = 1; ru <= H; ru++) {
      const candidate = { id: '__new__', size_ru: 1, position: ru, side: 'front' };
      if (Validation.canPlace(s, candidate)) { placed = ru; break; }
    }
    if (placed == null) {
      const btn = document.getElementById('btn-custom');
      const orig = btn.textContent;
      btn.textContent = 'No free RU on front view';
      btn.disabled = true;
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
      return;
    }
    let newId;
    State.setState(s2 => {
      newId = State.nextDeviceId(s2);
      s2.devices.push({
        id: newId,
        label: 'New device',
        size_ru: 1,
        position: placed,
        side: 'front',
        color: Palette.nextUnused(s2.devices, s2.sections),
        networkRole: 'device',
        portGroups: []
      });
      return s2;
    });
    // Open editor on the newly rendered tile.
    requestAnimationFrame(() => {
      const tile = document.querySelector(`.device-tile[data-device-id="${newId}"]`);
      if (tile) openDeviceEditor(tile);
    });
  }

  let sectionMode = false;
  let sectionDrag = null; // { side, start, end, hint }

  function setSectionMode(on) {
    sectionMode = on;
    document.body.classList.toggle('section-mode', on);
    const btn = document.getElementById('btn-section');
    if (btn) btn.textContent = on ? 'Cancel section' : '+ Section';
  }

  function gutterRuFromEvent(e) {
    // Determine which gutter and which RU based on the mouse position relative to the corresponding rack.
    for (const side of ['front','rear']) {
      const rackId = side === 'front' ? 'front-rack' : 'rear-rack';
      const gutterId = side === 'front' ? 'front-gutter' : 'rear-gutter';
      const gutter = document.getElementById(gutterId);
      if (!gutter) continue;
      const gr = gutter.getBoundingClientRect();
      if (e.clientX < gr.left || e.clientX > gr.right) continue;
      if (e.clientY < gr.top || e.clientY > gr.bottom) continue;
      const rack = document.getElementById(rackId);
      const rr = rack.getBoundingClientRect();
      const rowH = 26;
      const rackPaddingTop = 6;
      // Bottom of RU 1 is at rr.bottom - rackPaddingTop - 1 (border).
      const bottom = rr.bottom - rackPaddingTop - 1;
      const offsetFromBottom = bottom - e.clientY;
      const ru = Math.max(1, Math.min(State.get().rack.height_ru, Math.ceil(offsetFromBottom / rowH)));
      return { side, ru };
    }
    return null;
  }

  function attachSectionCreation() {
    document.addEventListener('click', e => {
      if (e.target && e.target.id === 'btn-section') setSectionMode(!sectionMode);
    });
    document.addEventListener('pointerdown', e => {
      if (!sectionMode) return;
      const hit = gutterRuFromEvent(e);
      if (!hit) return;
      e.preventDefault();
      sectionDrag = { side: hit.side, start: hit.ru, end: hit.ru };
      updateSectionHint();
      document.addEventListener('pointermove', onSectionMove);
      document.addEventListener('pointerup', onSectionUp);
    });
  }

  function updateSectionHint() {
    document.querySelectorAll('.ru-row.section-preview').forEach(r => r.classList.remove('section-preview'));
    if (!sectionDrag) return;
    const lo = Math.min(sectionDrag.start, sectionDrag.end);
    const hi = Math.max(sectionDrag.start, sectionDrag.end);
    const rackId = sectionDrag.side === 'front' ? 'front-rack' : 'rear-rack';
    const rack = document.getElementById(rackId);
    for (let ru = lo; ru <= hi; ru++) {
      const row = rack.querySelector(`.ru-row[data-ru="${ru}"]`);
      if (row) row.classList.add('section-preview');
    }
  }

  function onSectionMove(e) {
    if (!sectionDrag) return;
    const hit = gutterRuFromEvent(e);
    if (hit && hit.side === sectionDrag.side) {
      sectionDrag.end = hit.ru;
      updateSectionHint();
    }
  }

  function onSectionUp() {
    document.removeEventListener('pointermove', onSectionMove);
    document.removeEventListener('pointerup', onSectionUp);
    if (!sectionDrag) return;
    const lo = Math.min(sectionDrag.start, sectionDrag.end);
    const hi = Math.max(sectionDrag.start, sectionDrag.end);
    const defaultSide = sectionDrag.side;
    sectionDrag = null;
    document.querySelectorAll('.ru-row.section-preview').forEach(r => r.classList.remove('section-preview'));
    setSectionMode(false);
    // Open creation popover anchored to the front-rack element (good enough).
    const anchor = document.getElementById('front-rack');
    Popover.open(anchor, 'New section', [
      { key: 'name', label: 'Name', type: 'text', value: '' },
      { key: 'side', label: 'Side', type: 'radio', options: ['front','rear','both'], value: defaultSide },
      { key: 'color', label: 'Color', type: 'color', value: Palette.nextUnused(State.get().devices, State.get().sections) }
    ], values => {
      if (!values.name || !values.name.trim()) { alert('Section name is required.'); return; }
      State.setState(s => {
        s.sections.push({
          id: State.nextSectionId(s),
          name: values.name.trim(),
          side: values.side,
          ru_start: lo,
          ru_end: hi,
          color: values.color
        });
        return s;
      });
    });
  }

  function openSectionEditor(barEl) {
    const id = barEl.getAttribute('data-section-id');
    const sec = State.get().sections.find(x => x.id === id);
    if (!sec) return;
    Popover.open(barEl, `Edit section (${sec.id})`, [
      { key: 'name', label: 'Name', type: 'text', value: sec.name },
      { key: 'side', label: 'Side', type: 'radio', options: ['front','rear','both'], value: sec.side },
      { key: 'ru_start', label: 'RU start', type: 'number', min: 1, max: State.get().rack.height_ru, value: sec.ru_start },
      { key: 'ru_end',   label: 'RU end',   type: 'number', min: 1, max: State.get().rack.height_ru, value: sec.ru_end },
      { key: 'color', label: 'Color', type: 'color', value: sec.color }
    ],
    values => {
      if (!values.name || !values.name.trim()) { alert('Section name is required.'); return; }
      const lo = Math.min(values.ru_start, values.ru_end);
      const hi = Math.max(values.ru_start, values.ru_end);
      const H = State.get().rack.height_ru;
      if (lo < 1 || hi > H) { alert(`Range must be within 1..${H}.`); return; }
      State.setState(s => {
        const ss = s.sections.find(x => x.id === id);
        if (!ss) return s;
        ss.name = values.name.trim();
        ss.side = values.side;
        ss.ru_start = lo;
        ss.ru_end = hi;
        ss.color = values.color;
        return s;
      });
    },
    () => {
      if (!confirm(`Delete section "${sec.name}"?`)) return;
      State.setState(s => { s.sections = s.sections.filter(x => x.id !== id); return s; });
    });
  }

  function attachSectionClicks() {
    document.addEventListener('click', e => {
      if (sectionMode) return;
      const bar = e.target.closest('.section-bar');
      if (!bar) return;
      openSectionEditor(bar);
    });
  }

  function init() {
    attachPresetDrag();
    attachDeviceDrag();
    attachSectionCreation();
    attachSectionClicks();
    document.addEventListener('click', e => {
      if (e.target && e.target.id === 'btn-custom') addCustomDevice();
    });
    document.addEventListener('keydown', e => {
      if (e.key !== 'Delete' && e.key !== 'Backspace') return;
      const a = document.activeElement;
      if (a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA')) return;
      const tile = document.querySelector('.device-tile.selected');
      if (!tile) return;
      const id = tile.getAttribute('data-device-id');
      const dev = State.get().devices.find(x => x.id === id);
      if (!dev) return;
      if (!confirm(`Delete device "${dev.label}"?`)) return;
      State.setState(s => { s.devices = s.devices.filter(x => x.id !== id); return s; });
    });
    document.addEventListener('click', e => {
      if (e.target && e.target.id === 'btn-export') {
        const yaml = YamlCodec.toYaml(State.get());
        const blob = new Blob([yaml], { type: 'text/yaml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const safeName = State.get().rack.name.replace(/[^A-Za-z0-9_-]+/g, '_') || 'rack';
        a.href = url;
        a.download = safeName + '.yaml';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }
      if (e.target && e.target.id === 'btn-import') {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = '.yaml,.yml,text/yaml,text/plain';
        inp.addEventListener('change', () => {
          const file = inp.files && inp.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const parsed = YamlCodec.fromYaml(String(reader.result));
              const errors = Validation.validateState(parsed);
              if (errors.length) { alert('Import rejected:\n\n' + errors.join('\n')); return; }
              // Carry networking forward for older rack-only files; new-format
              // files already include it (merge is a no-op then).
              const merged = Net.mergeNetworkingAfterImport(State.get(), parsed);
              State.setState(() => merged);
            } catch (e) {
              alert('Import failed: ' + e.message);
            }
          };
          reader.readAsText(file);
        });
        inp.click();
      }
    });
  }

  return { init };
})();

// =================================================================
// Popover — generic editor used for devices and sections.
// =================================================================
const Popover = (() => {
  let current = null; // { el, escHandler }

  function close() {
    if (!current) return;
    current.el.remove();
    document.removeEventListener('keydown', current.escHandler);
    document.removeEventListener('pointerdown', current.outsideHandler, true);
    current = null;
  }

  // anchorEl: DOM element to position next to. fields: array of {key, label, type, value, options?}. onSave: (values) => void. onDelete: () => void (optional). extraButtons: optional array of {text, cls, onClick}.
  function open(anchorEl, title, fields, onSave, onDelete, extraButtons) {
    close();
    const rect = anchorEl.getBoundingClientRect();
    const wrap = document.createElement('div');
    wrap.className = 'popover';
    wrap.style.left = Math.min(rect.right + 8, window.innerWidth - 280) + 'px';
    // Initial top — clamped against viewport after the popover is appended
    // and its real height is known (the popover height varies with the field
    // mix; the color-swatch grid in particular makes it taller than any fixed estimate).
    wrap.style.top = Math.max(8, rect.top) + 'px';

    const titleEl = document.createElement('div');
    titleEl.className = 'popover-title';
    titleEl.textContent = title;
    wrap.appendChild(titleEl);

    const inputs = {};
    for (const f of fields) {
      const row = document.createElement('div');
      row.className = 'popover-field';
      const lbl = document.createElement('label');
      lbl.className = 'lbl';
      lbl.textContent = f.label;
      row.appendChild(lbl);
      let input;
      if (f.type === 'text') {
        input = document.createElement('input');
        input.type = 'text';
        input.value = f.value || '';
      } else if (f.type === 'number') {
        input = document.createElement('input');
        input.type = 'number';
        input.min = String(f.min || 1);
        input.max = String(f.max || 99);
        input.value = String(f.value);
      } else if (f.type === 'radio') {
        input = document.createElement('div');
        input.className = 'radio-row';
        for (const opt of f.options) {
          const id = `r-${f.key}-${opt}`;
          const r = document.createElement('input');
          r.type = 'radio'; r.name = f.key; r.id = id; r.value = opt;
          if (opt === f.value) r.checked = true;
          const ll = document.createElement('label');
          ll.htmlFor = id; ll.textContent = opt;
          input.appendChild(r); input.appendChild(ll);
        }
      } else if (f.type === 'select') {
        input = document.createElement('select');
        for (const opt of f.options) {
          const o = document.createElement('option');
          const val = typeof opt === 'object' ? opt.value : opt;
          o.value = val;
          o.textContent = typeof opt === 'object' ? opt.label : opt;
          if (val === f.value) o.selected = true;
          input.appendChild(o);
        }
      } else if (f.type === 'color') {
        input = document.createElement('div');
        input.className = 'color-grid';
        for (const c of Palette.COLORS) {
          const sw = document.createElement('button');
          sw.type = 'button';
          sw.className = 'swatch' + (c === f.value ? ' selected' : '');
          sw.style.background = c;
          sw.setAttribute('data-color', c);
          sw.addEventListener('click', () => {
            input.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            sw.classList.add('selected');
          });
          input.appendChild(sw);
        }
      }
      row.appendChild(input);
      inputs[f.key] = input;
      wrap.appendChild(row);
    }

    const btnRow = document.createElement('div');
    btnRow.className = 'popover-buttons';
    const save = document.createElement('button');
    save.className = 'btn primary';
    save.textContent = 'Save';
    save.addEventListener('click', () => {
      const values = {};
      for (const f of fields) {
        const el = inputs[f.key];
        if (f.type === 'text') values[f.key] = el.value;
        else if (f.type === 'number') values[f.key] = parseInt(el.value, 10);
        else if (f.type === 'radio') values[f.key] = el.querySelector('input:checked')?.value;
        else if (f.type === 'select') values[f.key] = el.value;
        else if (f.type === 'color') values[f.key] = el.querySelector('.swatch.selected')?.getAttribute('data-color') || f.value;
      }
      onSave(values);
      close();
    });
    btnRow.appendChild(save);
    if (onDelete) {
      const del = document.createElement('button');
      del.className = 'btn danger';
      del.textContent = 'Delete';
      del.addEventListener('click', () => { onDelete(); close(); });
      btnRow.appendChild(del);
    }
    const cancel = document.createElement('button');
    cancel.className = 'btn';
    cancel.textContent = 'Cancel';
    cancel.addEventListener('click', close);
    btnRow.appendChild(cancel);
    for (const b of (extraButtons || [])) {
      const btn = document.createElement('button');
      btn.className = b.cls || 'btn';
      btn.textContent = b.text;
      btn.addEventListener('click', () => { close(); b.onClick(); });
      btnRow.appendChild(btn);
    }
    wrap.appendChild(btnRow);

    document.body.appendChild(wrap);
    // Now that the popover is laid out, reposition vertically so it stays inside the viewport.
    const popH = wrap.getBoundingClientRect().height;
    const maxTop = Math.max(8, window.innerHeight - popH - 8);
    const curTop = parseFloat(wrap.style.top) || 0;
    if (curTop > maxTop) wrap.style.top = maxTop + 'px';
    // Focus the first text input if any.
    const firstText = wrap.querySelector('input[type="text"]');
    if (firstText) firstText.focus();

    const escHandler = e => { if (e.key === 'Escape') close(); };
    const outsideHandler = e => { if (!wrap.contains(e.target)) close(); };
    document.addEventListener('keydown', escHandler);
    // Defer outside-click handler until next tick so the click that opened it doesn't close it.
    setTimeout(() => document.addEventListener('pointerdown', outsideHandler, true), 0);

    current = { el: wrap, escHandler, outsideHandler };
  }

  return { open, close, isOpen: () => !!current };
})();

// =================================================================
// Settings — UI preferences persisted separately from rack state so they
// don't leak into the YAML export.
// =================================================================
const Settings = (() => {
  const KEY = 'rack-designer:ui:v1';
  const defaults = { scrollLock: true, activeView: 'rack', netOpenTabs: [], netActiveTab: 'cables' };
  let values = { ...defaults };
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) values = { ...defaults, ...JSON.parse(raw) };
  } catch (e) { /* keep defaults */ }
  function get(k) { return values[k]; }
  function set(k, v) {
    values[k] = v;
    try { localStorage.setItem(KEY, JSON.stringify(values)); } catch (e) {}
  }
  return { get, set };
})();

// Sync vertical scroll between front and back rack columns when Settings.scrollLock is on.
function bindScrollSync() {
  const front = document.getElementById('front-col');
  const back = document.getElementById('back-col');
  if (!front || !back) return;
  let syncing = false;
  function mirror(src, dst) {
    if (!Settings.get('scrollLock') || syncing) return;
    syncing = true;
    dst.scrollTop = src.scrollTop;
    requestAnimationFrame(() => { syncing = false; });
  }
  front.addEventListener('scroll', () => mirror(front, back));
  back.addEventListener('scroll', () => mirror(back, front));
}

// =================================================================
// View — top-level Rack / Networking tab switch.
// =================================================================
const View = (() => {
  function get() { return Settings.get('activeView') === 'networking' ? 'networking' : 'rack'; }
  function apply() {
    const v = get();
    const rack = document.getElementById('main-rack');
    const net = document.getElementById('main-net');
    if (rack) rack.style.display = v === 'rack' ? 'grid' : 'none';
    if (net) net.style.display = v === 'networking' ? 'flex' : 'none';
    document.querySelectorAll('#view-tabs .view-tab').forEach(b =>
      b.classList.toggle('active', b.getAttribute('data-view') === v));
  }
  function set(v) {
    Settings.set('activeView', v === 'networking' ? 'networking' : 'rack');
    apply();
    if (v === 'networking') NetRenderer.renderAll();
  }
  function init() {
    const tabs = document.getElementById('view-tabs');
    if (tabs) tabs.addEventListener('click', e => {
      const btn = e.target.closest('.view-tab');
      if (btn) set(btn.getAttribute('data-view'));
    });
  }
  return { get, set, apply, init };
})();

// =================================================================
// NetRenderer — owns #net-root. Inner tab strip (permanent "Cables"
// tab + closeable per-device tabs), the cables overview, and a
// per-device port/connection editor. Rebuilds from State on demand.
// =================================================================
const NetRenderer = (() => {
  const el = Renderer.el;
  let innerTabs = ['cables'];
  let activeInner = 'cables';
  let connecting = null; // { deviceId, portKey } — a port awaiting a connection
  let errorMsg = '';

  const ROLE_OPTS = [
    { value: 'patch-panel', label: 'Patch panel' },
    { value: 'switch', label: 'Switch' },
    { value: 'device', label: 'Device / server / PDU' }
  ];

  function roleOf(d) { return Net.ROLES.includes(d.networkRole) ? d.networkRole : Net.inferRole(d.label); }
  function groupsOf(d) { return Array.isArray(d.portGroups) ? d.portGroups : []; }
  function endTouches(end, devId, portKey) { return !Net.isExternal(end) && end.deviceId === devId && end.portKey === portKey; }
  function cablesForPort(state, devId, portKey) {
    return (state.cables || []).filter(c => endTouches(c.a, devId, portKey) || endTouches(c.b, devId, portKey));
  }
  function maxOrder(state) {
    return (state.cables || []).reduce((m, c) => Math.max(m, Number.isFinite(c.order) ? c.order : 0), 0);
  }

  function persist() {
    Settings.set('netOpenTabs', innerTabs.filter(t => t !== 'cables'));
    Settings.set('netActiveTab', activeInner);
  }
  function restore() {
    const ids = new Set((State.get().devices || []).map(d => d.id));
    const saved = Settings.get('netOpenTabs');
    const open = Array.isArray(saved) ? saved.filter(id => ids.has(id)) : [];
    innerTabs = ['cables', ...open];
    const sa = Settings.get('netActiveTab');
    activeInner = (sa === 'cables' || open.includes(sa)) ? sa : 'cables';
  }

  function openDeviceTab(deviceId) {
    if (!Net.deviceById(State.get(), deviceId)) return;
    if (!innerTabs.includes(deviceId)) innerTabs.push(deviceId);
    activeInner = deviceId; connecting = null; errorMsg = '';
    persist(); renderAll();
  }
  function closeTab(deviceId) {
    innerTabs = innerTabs.filter(t => t !== deviceId);
    if (activeInner === deviceId) activeInner = 'cables';
    persist(); renderAll();
  }
  function setActive(tab) {
    activeInner = tab; connecting = null; errorMsg = '';
    persist(); renderAll();
  }

  // ---- small input builders (raw elements so we can read .value back) ----
  function textInput(value, attrs) {
    const e = document.createElement('input');
    e.type = 'text'; e.value = value || '';
    if (attrs) for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }
  function numberInput(value, min, max) {
    const e = document.createElement('input');
    e.type = 'number'; e.value = String(value);
    if (min != null) e.min = String(min);
    if (max != null) e.max = String(max);
    return e;
  }

  // Endpoint picker: a <select> of every device port (grouped) plus an
  // "External" option that reveals a free-text input. Returns { el, getValue }.
  function buildEndpointPicker(state) {
    const wrap = el('span', { cls: 'net-row' });
    const sel = document.createElement('select');
    for (const d of state.devices) {
      const ports = Net.portsOf(d);
      if (!ports.length) continue;
      const og = document.createElement('optgroup');
      og.label = `${d.label} (${roleOf(d)})`;
      for (const p of ports) {
        const o = document.createElement('option');
        o.value = `P|${d.id}|${p.key}`;
        o.textContent = `p${p.index}${p.type ? ' · ' + p.type : ''}`;
        og.appendChild(o);
      }
      sel.appendChild(og);
    }
    const extOpt = document.createElement('option');
    extOpt.value = 'X'; extOpt.textContent = 'External / free-text…';
    sel.appendChild(extOpt);
    const extInput = textInput('', { placeholder: 'e.g. ISP uplink' });
    const syncExt = () => { extInput.style.display = sel.value === 'X' ? '' : 'none'; };
    sel.addEventListener('change', syncExt);
    syncExt();
    wrap.appendChild(sel); wrap.appendChild(extInput);
    function getValue() {
      if (sel.value === 'X') { const t = extInput.value.trim(); return t ? { external: t } : null; }
      const parts = sel.value.split('|');
      return parts[0] === 'P' ? { deviceId: parts[1], portKey: parts[2] } : null;
    }
    return { el: wrap, getValue };
  }

  // ---- port-group commits (commit on change; reject over-cap) ----
  function commitGroups(deviceId, newGroups) {
    const dev = Net.deviceById(State.get(), deviceId);
    const role = dev ? roleOf(dev) : 'device';
    const errs = Net.validatePortGroups(role, newGroups);
    if (errs.length) { errorMsg = errs[0]; renderAll(); return; }
    errorMsg = '';
    State.setState(s => {
      const d = s.devices.find(x => x.id === deviceId);
      if (d) d.portGroups = newGroups;
      return s;
    });
  }

  // ---- cable mutations ----
  function addCable(a, b, extra) {
    if (!a || !b) { errorMsg = 'Both ends are required.'; renderAll(); return; }
    errorMsg = '';
    State.setState(s => {
      s.cables = s.cables || [];
      s.cables.push(Object.assign({ id: State.nextCableId(s), a, b, order: maxOrder(s) + 1 }, extra || {}));
      return s;
    });
    connecting = null;
  }
  function deleteCable(id) {
    State.setState(s => { s.cables = (s.cables || []).filter(c => c.id !== id); return s; });
  }
  function moveCable(id, dir) {
    State.setState(s => {
      const sorted = Net.sortCables(s);
      sorted.forEach((c, i) => { const cc = s.cables.find(x => x.id === c.id); if (cc) cc.order = i + 1; });
      const idx = sorted.findIndex(c => c.id === id);
      const j = idx + dir;
      if (idx < 0 || j < 0 || j >= sorted.length) return s;
      const a = s.cables.find(x => x.id === sorted[idx].id);
      const b = s.cables.find(x => x.id === sorted[j].id);
      const t = a.order; a.order = b.order; b.order = t;
      return s;
    });
  }

  function downloadCsv() {
    const state = State.get();
    const csv = Net.toCsv(state);
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safe = (state.rack.name || 'rack').replace(/[^A-Za-z0-9_-]+/g, '_') || 'rack';
    a.href = url; a.download = safe + '-cables.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  // ---- render: tab strip ----
  function renderTabStrip(state) {
    const strip = el('div', { cls: 'net-tabstrip' });
    strip.appendChild(el('div', {
      cls: 'net-tab' + (activeInner === 'cables' ? ' active' : ''),
      text: 'Cables', on: { click: () => setActive('cables') }
    }));
    for (const id of innerTabs) {
      if (id === 'cables') continue;
      const d = Net.deviceById(state, id);
      if (!d) continue;
      const tab = el('div', { cls: 'net-tab' + (activeInner === id ? ' active' : ''), on: { click: () => setActive(id) } }, [d.label]);
      tab.appendChild(el('button', {
        cls: 'net-tab-close', text: '×', attrs: { title: 'Close tab', type: 'button' },
        on: { click: e => { e.stopPropagation(); closeTab(id); } }
      }));
      strip.appendChild(tab);
    }
    return strip;
  }

  // ---- render: cables overview pane ----
  function renderCablesPane(state) {
    const pane = el('div', { cls: 'net-pane' });
    const tplVal = (state.network && state.network.labelTemplate) || '';

    // Controls
    const tplInput = textInput(tplVal);
    tplInput.classList.add('net-grow');
    tplInput.addEventListener('change', () => {
      State.setState(s => { s.network = s.network || {}; s.network.labelTemplate = tplInput.value; return s; });
    });
    const controls = el('div', { cls: 'net-card' }, [
      el('div', { cls: 'net-row' }, [
        el('span', { cls: 'net-muted', text: 'Label template' }), tplInput
      ]),
      el('div', { cls: 'net-muted', style: { marginTop: '4px' },
        text: 'Tokens: {A.device} {A.id} {A.port} {A.portType} {A.role} (and {B.*}) {cableType} {length}' }),
      el('div', { cls: 'net-row', style: { marginTop: '8px' } }, [
        el('button', { cls: 'btn', text: 'Download cable labels (CSV)', on: { click: downloadCsv } }),
        el('button', { cls: 'btn', text: 'Apply template to all', on: { click: () => {
          if (!confirm('Set every cable\'s label to the current template result? This overwrites manual labels.')) return;
          State.setState(s => { (s.cables || []).forEach(c => { c.label = Net.renderLabel(s, c, s.network && s.network.labelTemplate); }); return s; });
        } } }),
        el('button', { cls: 'btn', text: 'Renumber order', on: { click: () => {
          State.setState(s => { const sorted = Net.sortCables(s); sorted.forEach((c, i) => { const cc = s.cables.find(x => x.id === c.id); if (cc) cc.order = i + 1; }); return s; });
        } } }),
        el('button', { cls: 'btn', text: 'Remove broken', on: { click: () => {
          const broken = (state.cables || []).filter(c => Net.cableStatus(state, c).status === 'broken');
          if (!broken.length) { alert('No broken cables.'); return; }
          if (!confirm(`Remove ${broken.length} broken cable(s)?`)) return;
          State.setState(s => { s.cables = (s.cables || []).filter(c => Net.cableStatus(s, c).status !== 'broken'); return s; });
        } } })
      ])
    ]);

    // Add cable form
    const pickA = buildEndpointPicker(state);
    const pickB = buildEndpointPicker(state);
    const typeInput = textInput('', { placeholder: 'Cat6' }); typeInput.style.width = '90px';
    const lenInput = textInput('', { placeholder: '2m' }); lenInput.style.width = '70px';
    const addCard = el('div', { cls: 'net-card' }, [
      el('div', { cls: 'net-row' }, [ el('span', { cls: 'net-muted', text: 'A' }), pickA.el ]),
      el('div', { cls: 'net-row' }, [ el('span', { cls: 'net-muted', text: 'B' }), pickB.el ]),
      el('div', { cls: 'net-row' }, [
        el('span', { cls: 'net-muted', text: 'Type' }), typeInput,
        el('span', { cls: 'net-muted', text: 'Length' }), lenInput,
        el('button', { cls: 'btn primary', text: 'Add cable', on: { click: () => {
          addCable(pickA.getValue(), pickB.getValue(), {
            cableType: typeInput.value.trim() || undefined,
            length: lenInput.value.trim() || undefined
          });
        } } })
      ])
    ]);

    const section = el('div', { cls: 'net-section' }, [
      el('h3', { text: 'Cables' }),
      controls,
      el('h3', { text: 'Add cable' }),
      addCard
    ]);
    if (errorMsg) section.appendChild(el('div', { cls: 'net-badge broken', text: errorMsg, style: { marginBottom: '8px' } }));
    section.appendChild(renderCableTable(state));
    pane.appendChild(section);
    return pane;
  }

  function renderCableTable(state) {
    const cables = Net.sortCables(state);
    if (!cables.length) return el('div', { cls: 'net-empty', text: 'No cables yet. Add one above, or open a device tab to connect its ports.' });
    const table = el('table', { cls: 'net-table' });
    const head = el('tr', {}, [
      el('th', { text: '#' }), el('th', { text: 'Label' }), el('th', { text: 'A' }),
      el('th', { text: 'B' }), el('th', { text: 'Type' }), el('th', { text: 'Len' }),
      el('th', { text: 'Status' }), el('th', { text: '' })
    ]);
    table.appendChild(el('thead', {}, [head]));
    const body = el('tbody', {});
    cables.forEach(c => {
      const st = Net.cableStatus(state, c);
      const orderCell = el('td', {}, [
        String(Number.isFinite(c.order) ? c.order : ''),
        el('button', { cls: 'net-iconbtn', text: '▲', attrs: { title: 'Move up' }, on: { click: () => moveCable(c.id, -1) } }),
        el('button', { cls: 'net-iconbtn', text: '▼', attrs: { title: 'Move down' }, on: { click: () => moveCable(c.id, 1) } })
      ]);
      const editBtn = el('button', { cls: 'net-iconbtn', text: 'Edit' });
      editBtn.addEventListener('click', () => openCableEditor(editBtn, c.id));
      const row = el('tr', { cls: st.status === 'broken' ? 'broken' : '' }, [
        orderCell,
        el('td', { text: Net.effectiveLabel(state, c) }),
        el('td', { text: Net.endpointLabel(state, c.a) }),
        el('td', { text: Net.endpointLabel(state, c.b) }),
        el('td', { text: c.cableType || '' }),
        el('td', { text: c.length || '' }),
        el('td', {}, [ el('span', { cls: 'net-badge ' + st.status, text: st.status, attrs: st.reason ? { title: st.reason } : {} }) ]),
        el('td', {}, [ editBtn, el('button', { cls: 'net-iconbtn', text: 'Del', on: { click: () => deleteCable(c.id) } }) ])
      ]);
      body.appendChild(row);
    });
    table.appendChild(body);
    return el('div', { cls: 'net-card' }, [table]);
  }

  function openCableEditor(anchor, cableId) {
    const c = (State.get().cables || []).find(x => x.id === cableId);
    if (!c) return;
    Popover.open(anchor, `Edit cable (${c.id})`, [
      { key: 'cableType', label: 'Cable type', type: 'text', value: c.cableType || '' },
      { key: 'length', label: 'Length', type: 'text', value: c.length || '' },
      { key: 'label', label: 'Label override (blank = use template)', type: 'text', value: c.label || '' },
      { key: 'notes', label: 'Notes', type: 'text', value: c.notes || '' }
    ], values => {
      State.setState(s => {
        const cc = (s.cables || []).find(x => x.id === cableId);
        if (!cc) return s;
        const setOrDel = (k, v) => { if (v && String(v).trim()) cc[k] = String(v).trim(); else delete cc[k]; };
        setOrDel('cableType', values.cableType);
        setOrDel('length', values.length);
        setOrDel('label', values.label);
        setOrDel('notes', values.notes);
        return s;
      });
    }, () => deleteCable(cableId));
  }

  // ---- render: per-device pane ----
  function renderDevicePane(state, d) {
    const pane = el('div', { cls: 'net-pane' });
    const role = roleOf(d);
    const groups = groupsOf(d);
    const cap = Net.CAPS[role] || Net.CAPS['device'];
    const total = Net.portCount({ portGroups: groups });

    // Header + role select
    const roleSel = document.createElement('select');
    for (const o of ROLE_OPTS) {
      const opt = document.createElement('option');
      opt.value = o.value; opt.textContent = o.label; if (o.value === role) opt.selected = true;
      roleSel.appendChild(opt);
    }
    roleSel.addEventListener('change', () => {
      State.setState(s => { const dev = s.devices.find(x => x.id === d.id); if (dev) dev.networkRole = roleSel.value; return s; });
    });
    const header = el('div', { cls: 'net-card' }, [
      el('div', { cls: 'net-row' }, [
        el('span', { cls: 'net-pill', text: `RU ${d.position}`, style: { background: d.color } }),
        el('strong', { text: d.label }),
        el('span', { cls: 'net-muted', text: d.id }),
        el('span', { cls: 'net-grow' }),
        el('span', { cls: 'net-muted', text: 'Role' }), roleSel
      ])
    ]);

    // Port-group editor
    const groupRefs = [];
    const groupsBox = el('div', {});
    const readGroups = () => groupRefs.map(r => ({ type: r.typeEl.value.trim(), count: parseInt(r.countEl.value, 10) || 0 }));
    groups.forEach((g, gi) => {
      const typeEl = textInput(g.type, { placeholder: 'RJ45' });
      const countEl = numberInput(g.count, 0, cap.max);
      typeEl.addEventListener('change', () => commitGroups(d.id, readGroups()));
      countEl.addEventListener('change', () => commitGroups(d.id, readGroups()));
      groupRefs.push({ typeEl, countEl });
      const removeBtn = el('button', { cls: 'net-iconbtn', text: 'Remove', on: { click: () => {
        if (cablesForDevice(state, d.id).length &&
            !confirm('Removing a port group renumbers later groups and can break existing cable links. Continue?')) return;
        const next = readGroups(); next.splice(gi, 1);
        commitGroups(d.id, next);
      } } });
      groupsBox.appendChild(el('div', { cls: 'net-portgroup' }, [
        el('span', { cls: 'net-muted', text: `g${gi}` }),
        typeEl, el('span', { cls: 'net-muted', text: '×' }), countEl, removeBtn
      ]));
    });
    const canAddGroup = cap.multiGroup || groups.length === 0;
    const addGroupBtn = el('button', { cls: 'btn', text: '+ Port group', attrs: canAddGroup ? {} : { disabled: 'disabled' }, on: { click: () => {
      if (!canAddGroup) return;
      commitGroups(d.id, [...readGroups(), { type: cap.defaultType, count: 1 }]);
    } } });
    const portCard = el('div', { cls: 'net-card' }, [
      el('div', { cls: 'net-row' }, [
        el('span', { cls: 'net-muted', text: `Total ports: ${total} / ${cap.max} (min ${cap.min})` })
      ]),
      groupsBox,
      el('div', { cls: 'net-row' }, [addGroupBtn])
    ]);
    if (errorMsg) portCard.appendChild(el('div', { cls: 'net-badge broken', text: errorMsg, style: { marginTop: '8px' } }));

    const section = el('div', { cls: 'net-section' }, [
      el('h3', { text: 'Device' }), header,
      el('h3', { text: 'Ports' }), portCard,
      el('h3', { text: 'Connections' }), renderPortsTable(state, d)
    ]);
    pane.appendChild(section);
    return pane;
  }

  function cablesForDevice(state, devId) {
    return (state.cables || []).filter(c =>
      (!Net.isExternal(c.a) && c.a.deviceId === devId) ||
      (!Net.isExternal(c.b) && c.b.deviceId === devId));
  }

  function renderPortsTable(state, d) {
    const ports = Net.portsOf(d);
    if (!ports.length) return el('div', { cls: 'net-empty', text: 'No ports yet. Add a port group above.' });
    const table = el('table', { cls: 'net-table' });
    table.appendChild(el('thead', {}, [el('tr', {}, [
      el('th', { text: 'Port' }), el('th', { text: 'Type' }), el('th', { text: 'Connected to' }), el('th', { text: '' })
    ])]));
    const body = el('tbody', {});
    ports.forEach(p => {
      const conns = cablesForPort(state, d.id, p.key);
      const connCell = el('td', {});
      if (conns.length) {
        conns.forEach(c => {
          const other = endTouches(c.a, d.id, p.key) ? c.b : c.a;
          const st = Net.cableStatus(state, c);
          connCell.appendChild(el('div', { cls: 'net-row' }, [
            el('span', { text: Net.endpointLabel(state, other) }),
            el('span', { cls: 'net-badge ' + st.status, text: st.status }),
            el('button', { cls: 'net-iconbtn', text: 'Disconnect', on: { click: () => deleteCable(c.id) } })
          ]));
        });
      } else {
        connCell.appendChild(el('span', { cls: 'net-muted', text: '—' }));
      }
      const isConnecting = connecting && connecting.deviceId === d.id && connecting.portKey === p.key;
      const actionCell = el('td', {});
      actionCell.appendChild(el('button', {
        cls: 'net-iconbtn', text: isConnecting ? 'Cancel' : 'Connect',
        on: { click: () => { connecting = isConnecting ? null : { deviceId: d.id, portKey: p.key }; errorMsg = ''; renderAll(); } }
      }));
      const row = el('tr', {}, [
        el('td', { text: 'p' + p.index }),
        el('td', { text: p.type || '' }),
        connCell, actionCell
      ]);
      body.appendChild(row);
      if (isConnecting) {
        const pick = buildEndpointPicker(state);
        const form = el('tr', {}, [ el('td', { attrs: { colspan: '4' } }, [
          el('div', { cls: 'net-row' }, [
            el('span', { cls: 'net-muted', text: `Connect p${p.index} to` }), pick.el,
            el('button', { cls: 'btn primary', text: 'Connect', on: { click: () => {
              addCable({ deviceId: d.id, portKey: p.key }, pick.getValue());
            } } })
          ])
        ])]);
        body.appendChild(form);
      }
    });
    table.appendChild(body);
    return el('div', { cls: 'net-card' }, [table]);
  }

  function renderAll() {
    const root = document.getElementById('net-root');
    if (!root) return;
    const state = State.get();
    const ids = new Set((state.devices || []).map(d => d.id));
    innerTabs = ['cables', ...innerTabs.filter(t => t !== 'cables' && ids.has(t))];
    if (activeInner !== 'cables' && !ids.has(activeInner)) activeInner = 'cables';
    let pane;
    if (activeInner === 'cables') pane = renderCablesPane(state);
    else pane = renderDevicePane(state, Net.deviceById(state, activeInner));
    root.replaceChildren(renderTabStrip(state), pane);
  }

  function init() { restore(); }

  return { init, renderAll, openDeviceTab, closeTab };
})();

// =================================================================
// Boot
// =================================================================
State.load();
View.init();
State.onChange(() => { Renderer.renderAll(); NetRenderer.renderAll(); });
Renderer.renderAll();
NetRenderer.init();
NetRenderer.renderAll();
DragController.init();
bindScrollSync();
View.apply();

if (new URLSearchParams(location.search).get('test') === '1') {
  Tests.run();
}
</script>
</body>
</html>
